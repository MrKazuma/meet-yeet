<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet & Yeet</title>
<link rel="icon" type="image/png" href="/icons/logo.png">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#1a1a1a;
color:white;
}

/* NAVBAR */

#navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#2a2a2a;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

#logo{
font-size:22px;
font-weight:bold;
color:#ff7a00;
}

#loginBtn{
background:#ff7a00;
border:none;
padding:10px 18px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* HERO */

#hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#hero h1{
font-size:48px;
margin-bottom:10px;
}

#hero p{
color:#aaa;
font-size:18px;
margin-bottom:30px;
}

#startBtn{
background:#ff7a00;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

#scheduleBtn{
margin-top:12px;
background:#2b9fff;
border:none;
padding:12px 24px;
font-size:16px;
border-radius:8px;
cursor:pointer;
color:white;
}

#scheduleBtn:hover{
background:#4aaeff;
}

/* JOIN BOX */

#joinBox{
margin-top:30px;
}

#joinInput{
padding:12px;
width:220px;
border:none;
border-radius:6px;
}

#joinBtn{
padding:12px 16px;
border:none;
background:#ff7a00;
color:white;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

#upcoming{
margin-top:34px;
background:#1d1d1d;
padding:16px;
border-radius:10px;
width:420px;
max-width:90%;
text-align:left;
}

#upcoming h3{
margin:0 0 10px;
font-size:18px;
color:#ff7a00;
}

#upcomingList{
margin:0;
padding-left:18px;
}

#upcomingList li{
margin:8px 0;
color:#ddd;
}

#upcomingList a{
color:#2b9fff;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  #navbar {
    padding: 15px 20px;
  }
  #hero h1 {
    font-size: 32px;
  }
  #hero p {
    font-size: 16px;
    padding: 0 20px;
  }
  #startBtn, #scheduleBtn {
    width: 90%;
    margin: 10px auto;
  }
  #joinBox {
    display: flex;
    width: 90%;
    gap: 10px;
  }
  #joinInput {
    flex: 1;
    width: auto;
  }
  #joinBtn {
    margin-left: 0;
  }
}

</style>
</head>

<body>

<div id="navbar">

<div id="logo" style="display:flex; align-items:center; gap:10px;">
<img src="/icons/logo.png" height="30" alt="Meet & Yeet Logo">
Meet & Yeet
</div>

<div id="navActions" style="display:flex; align-items:center; gap:15px;">
<div id="profileContainer" style="display:none; align-items:center; gap:8px; background:#2a2a2a; padding:6px 14px; border-radius:30px; border: 1px solid #444;">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff7a00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
    <circle cx="12" cy="7" r="4"></circle>
  </svg>
  <span id="profileName" style="color:#ddd; font-weight:600; font-size:14px; margin-top:2px;"></span>
</div>
<button id="loginBtn" onclick="handleAuthButton()">
Login
</button>
</div>

</div>

<div id="hero">

<h1>Video Meetings Made Simple</h1>

<p><b>Start or join meetings instantly with Meet & Yeet © 2026.</b></p>
<p> “Click. Meet. Yeet.”</p>

<button id="startBtn" onclick="createMeeting()">
Start Meeting
</button>

<button id="scheduleBtn" onclick="goToSchedule()">
Schedule Meeting
</button>

<div id="joinBox">

<input id="joinInput" placeholder="Enter Meeting ID" autocomplete="off">

<button id="joinBtn" onclick="joinMeeting()">
Join
</button>

</div>

<div id="upcoming">
<h3>Upcoming Meetings</h3>
<ul id="upcomingList">
<li>Loading scheduled meetings...</li>
</ul>
</div>

</div>

<script>
const API_URL = (() => {
const host = window.location.hostname;
if(host === "localhost" || host === "127.0.0.1"){
return "";
}
return "https://meet-yeet-1.onrender.com";
})();


let isLoggedIn = false;

async function syncAuthState(){
const loginBtn = document.getElementById("loginBtn");
const profileName = document.getElementById("profileName");
const profileContainer = document.getElementById("profileContainer");

try{
const res = await fetch(`${API_URL}/me`, { credentials: "include" });
const data = await res.json();

isLoggedIn = Boolean(res.ok && data.success);
if (isLoggedIn && data.user) {
    profileName.textContent = data.user.name || data.user.email;
    profileContainer.style.display = "flex";
} else {
    profileContainer.style.display = "none";
}
}catch(error){
isLoggedIn = false;
profileContainer.style.display = "none";
}

loginBtn.textContent = isLoggedIn ? "Logout" : "Login";
}

function handleAuthButton(){
if(isLoggedIn){
logout();
return;
}

const nextPath = encodeURIComponent(window.location.pathname || "/");
window.location = "/login?next=" + nextPath;
}

function goToSchedule(){
window.location = "/schedule";
}

async function logout(){
try{
await fetch(`${API_URL}/logout`, {
method: "POST",
credentials: "include"
});
}catch(error){
}

isLoggedIn = false;
document.getElementById("loginBtn").textContent = "Login";
document.getElementById("profileContainer").style.display = "none";
window.location = "/";
}

function joinMeeting(){

const id=document.getElementById("joinInput").value;

if(id){
window.location="/room/"+id;
}

}

document.getElementById("joinInput").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        joinMeeting();
    }
});

async function loadScheduledMeetings(){

const list=document.getElementById("upcomingList");

try{
const res=await fetch(`${API_URL}/scheduled-meetings`, { credentials: "include" });
const data=await res.json();

if(!data.success || !data.meetings.length){
list.innerHTML="<li>No meetings scheduled yet.</li>";
return;
}

list.innerHTML="";

data.meetings.slice(0,5).forEach(meeting=>{
const li=document.createElement("li");
const when=new Date(meeting.time).toLocaleString();
li.innerHTML=`${meeting.title} - ${when} (<a href="${meeting.link}">Join</a>)`;
list.appendChild(li);
});

}catch(error){
list.innerHTML="<li>Unable to load scheduled meetings.</li>";
}

}

loadScheduledMeetings();

async function createMeeting(){

if(!isLoggedIn){
const nextPath = encodeURIComponent(window.location.pathname || "/");
window.location = "/login?next=" + nextPath;
return;
}

try{
const res = await fetch(`${API_URL}/create-meeting`,{
method:"POST",
credentials:"include"
});

const data = await res.json();

if(res.status === 401){
const nextPath = encodeURIComponent(window.location.pathname || "/");
window.location = "/login?next=" + nextPath;
return;
}

if(!res.ok || !data.link){
alert("Unable to create meeting right now");
return;
}

window.location = data.link;
}catch(error){
alert("Unable to create meeting right now");
}

}

syncAuthState();

</script>

</body>
</html>
