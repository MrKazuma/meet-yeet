<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="icon" type="image/png" href="/icons/logo.png">
<style>
body{
font-family: Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#1a1a1a;
color:white;
}

.box{
background:#2a2a2a;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
width: 90%;
max-width: 320px;
box-sizing: border-box;
}

h2{
color:#ff7a00;
margin-top:0;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:calc(100% - 22px);
border-radius:5px;
border:1px solid #444;
background:#333;
color:white;
}

button{
padding:10px;
width:100%;
background:#ff7a00;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e06b00;
}

.toggle {
font-size: 14px;
text-align: center;
margin-top: 15px;
color: #ff7a00;
cursor: pointer;
text-decoration: underline;
}

#msg {
color: #ff4d4d;
text-align: center;
font-size: 14px;
}

#signupSection {
display: none;
}
</style>
</head>

<body>

<div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
  <div style="display:flex; align-items:center; gap:10px; font-size:28px; font-weight:bold; color:#ff7a00;">
    <img src="/icons/logo.png" height="40" alt="Meet & Yeet Logo">
    Meet & Yeet 
  </div>
  <div class="box">

<div id="loginSection">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div class="toggle" onclick="toggleView('signup')">Don't have an account? Sign up</div>
</div>

<div id="signupSection">
<h2>Sign up</h2>
<input id="signupName" placeholder="Name">
<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password (min 6 chars)">
<button onclick="signup()">Sign up</button>
<div class="toggle" onclick="toggleView('login')">Already have an account? Login</div>
</div>

<p id="msg"></p>

</div>

<script>
const API_URL = (() => {
const host = window.location.hostname;
if(host === "localhost" || host === "127.0.0.1"){
return "";
}
return "/api";
})();


function getNextPath(){
const params = new URLSearchParams(window.location.search);
const next = params.get("next");

if(!next || !next.startsWith("/")){
return "/";
}

return next;
}

document.getElementById("loginPassword").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        login();
    }
});

document.getElementById("loginEmail").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        login();
    }
});

document.getElementById("signupPassword").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        signup();
    }
});

document.getElementById("signupEmail").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        signup();
    }
});

document.getElementById("signupName").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        signup();
    }
});

function toggleView(view) {
document.getElementById("msg").innerText = "";
if(view === 'signup') {
document.getElementById("loginSection").style.display = "none";
document.getElementById("signupSection").style.display = "block";
} else {
document.getElementById("loginSection").style.display = "block";
document.getElementById("signupSection").style.display = "none";
}
}

async function login(){

const email = document.getElementById("loginEmail").value;
const password = document.getElementById("loginPassword").value;

try{
const res = await fetch(`${API_URL}/login`,{
method:"POST",
credentials:"include",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(data.success){
localStorage.setItem("user",JSON.stringify(data.user));
window.location.href=getNextPath();
}else{
document.getElementById("msg").innerText=data.message || "Login failed";
}
}catch(error){
document.getElementById("msg").innerText="Unable to reach server. Please try again in a moment.";
}

}

async function signup(){

const name = document.getElementById("signupName").value;
const email = document.getElementById("signupEmail").value;
const password = document.getElementById("signupPassword").value;

try{
const res = await fetch(`${API_URL}/signup`,{
method:"POST",
credentials:"include",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name,email,password})
});

const data = await res.json();

if(data.success){
localStorage.setItem("user",JSON.stringify(data.user));
window.location.href=getNextPath();
}else{
document.getElementById("msg").innerText=data.message || "Signup failed";
}
}catch(error){
document.getElementById("msg").innerText="Unable to reach server. Please try again in a moment.";
}

}

</script>

</div>
</body>
</html>
