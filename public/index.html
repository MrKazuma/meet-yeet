<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VClust</title>
<link rel="icon" type="image/png" href="/icons/logo.png">

<script>
const user = localStorage.getItem("user");
if(!user){
  window.location.href="/login.html";
}
</script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#1a1a1a;
color:white;
overflow:hidden;
}

/* HEADER */

#header{
position:absolute;
top:15px;
left:20px;
font-size:18px;
font-weight:bold;
color:#ff7a00;
}

/* ACCOUNT ICON */

#accountIcon{
position:absolute;
top:10px;
right:20px;
cursor:pointer;
}

/* ACCOUNT PANEL */

#accountPanel{
position:absolute;
top:60px;
right:20px;
width:220px;
background:#2a2a2a;
padding:15px;
border-radius:10px;
display:none;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
z-index:10;
}

#accountPanel input{
width:100%;
padding:6px;
margin-top:8px;
margin-bottom:8px;
border:none;
border-radius:5px;
}

#accountPanel button{
width:100%;
padding:6px;
margin-top:5px;
background:#ff7a00;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* VIDEO AREA */

#videoStage{
position:absolute;
top:0;
left:0;
right:320px;
bottom:120px;
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:10px;
padding:10px;
overflow-y:auto;
}

#videoContainer{
min-width:300px;
min-height:200px;
max-height:100%;
flex: 1 1 300px;
position:relative;
display:flex;
justify-content:center;
align-items:center;
background:black;
border-radius:12px;
overflow:hidden;
}

.remoteVideoContainer {
min-width:300px;
min-height:200px;
max-height:100%;
flex: 1 1 300px;
position:relative;
display:flex;
justify-content:center;
align-items:center;
background:black;
border-radius:12px;
overflow:hidden;
}

.remoteVideoContainer video {
width:100%;
height:100%;
object-fit:cover;
}

#videoContainer.sharing, .remoteVideoContainer.sharing {
max-height: 100% !important;
flex: 1 1 100% !important;
}

#backgroundLayer{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
z-index:0;
}

video{
position:relative;
z-index:1;
width:100%;
height:100%;
object-fit:cover;
}

/* CONTROL BAR */

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#2a2a2a;
padding:10px 20px;
border-radius:50px;
display:flex;
gap:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
z-index: 9999;
}

.controlBtn{
background:#3a3a3a;
border:none;
border-radius:50%;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.2s;
}

.controlBtn:hover{
background:#ff7a00;
}

.controlBtn svg{
width:24px;
height:24px;
}

/* TOOLTIPS */
[data-tooltip] {
  position: relative;
}

[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 110%; /* Place directly above the button */
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(0, 0, 0, 0.85);
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s ease, transform 0.2s ease;
  pointer-events: none;
  z-index: 100;
}

[data-tooltip]:hover::after {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
}

#endMeetingBtn {
background-color: #e63946;
border: none;
border-radius: 30px;
color: white;
padding: 0 24px;
font-weight: bold;
cursor: pointer;
transition: 0.2s;
height: 60px;
font-size: 16px;
display: flex;
align-items: center;
justify-content: center;
}

#endMeetingBtn:hover {
background-color: #d62828;
}

/* BACKGROUND DROPDOWN */

.cam-options {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: #2a2a2a;
  border-radius: 8px;
  padding: 8px;
  display: none;
  flex-direction: column;
  gap: 5px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
  border: 1px solid #444;
  min-width: 140px;
  z-index: 9999;
}

.cam-options.show {
  display: flex !important;
}

.split-btn {
  position: relative;
  display: flex;
  align-items: stretch;
  background: #3a3a3a;
  border-radius: 30px;
}
.split-btn-main {
  background: transparent;
  border: none;
  border-radius: 30px 0 0 30px;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.3s;
}
.split-btn-main:hover, .split-btn-drop:hover {
  background: #ff7a00;
}
.split-btn-main svg {
  width: 24px;
  height: 24px;
}
.split-btn-drop {
  background: transparent;
  border: none;
  border-left: 1px solid #555;
  border-radius: 0 30px 30px 0;
  padding: 0 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

@media (max-width: 850px) {
  .split-btn-main {
    width: 45px;
    height: 45px;
  }
  .split-btn-main svg {
    width: 20px;
    height: 20px;
  }
}

.cam-options button {
  background: transparent;
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 4px;
  cursor: pointer;
  text-align: left;
  transition: 0.2s;
}

.cam-options button:hover {
  background: #ff7a00;
}

/* CHAT PANEL */

#chatPanel{
position:absolute;
top:0;
right:0;
width:320px;
bottom:0;
background:#2a2a2a;
display:flex;
flex-direction:column;
border-left:1px solid #444;
}

#chatHeader{
padding:15px;
font-weight:bold;
border-bottom:1px solid #444;
color:#ff7a00;
}

#participantsSection{
padding:12px 15px;
border-bottom:1px solid #444;
}

#participantsTitle{
font-size:14px;
font-weight:bold;
margin-bottom:8px;
}

#participantsCount{
color:#bbb;
font-weight:normal;
margin-left:6px;
}

#participantsList{
margin:0;
padding-left:18px;
max-height:100px;
overflow-y:auto;
}

#participantsList li{
margin:4px 0;
color:#ddd;
}

#chatBox{
flex:1;
overflow-y:auto;
padding:10px;
}

#chatInputArea{
display:flex;
padding:10px;
border-top:1px solid #444;
}

#chatInput{
flex:1;
padding:8px;
border-radius:6px;
border:none;
outline:none;
background:#3a3a3a;
color:white;
}

#sendBtn{
margin-left:5px;
background:#ff7a00;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

#sendBtn:hover{
background:#ff9a3c;
}

/* UPGRADE BUTTON */

#upgradeBtn{
background:#ff7a00;
border:none;
padding:8px 12px;
margin:10px;
border-radius:6px;
cursor:pointer;
color:white;
}

#upgradeBtn:hover{
background:#ff9a3c;
}

/* RESPONSIVE LAYOUT */
@media (max-width: 850px) {
  #videoStage {
    right: 0;
    bottom: 150px;
    padding: 5px;
  }
  
  #videoContainer, .remoteVideoContainer {
    flex: 1 1 150px;
    height: auto;
    max-height: 100%;
    min-width: 150px;
    min-height: 150px;
  }
  
  #chatPanel {
    position: fixed;
    top: auto;
    bottom: -100%; /* hide it by default */
    right: 0;
    left: 0;
    width: 100%;
    height: 60vh;
    border-left: none;
    border-top: 2px solid #ff7a00;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
    transition: bottom 0.3s ease-in-out;
    z-index: 50;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
  }

  #chatPanel.active {
    bottom: 0;
  }
  
  /* Close Chat Button wrapper */
  #chatOpenerWrapper {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #closeChatBtnMobile {
    display: block !important;
    background: transparent;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    padding-right: 15px;
  }
  
  #controls {
    width: 90%;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
    justify-content: space-around;
    bottom: 10px;
  }
  
  .controlBtn {
    width: 45px;
    height: 45px;
  }

  .controlBtn svg {
    width: 20px;
    height: 20px;
  }
  
  #endMeetingBtn {
    height: 45px;
    padding: 0 15px;
    font-size: 14px;
  }
  
  #chatToggleBtnMobile {
    display: flex !important;
  }

  #backgroundSelector {
    bottom: 80px;
    width: 90%;
    flex-wrap: wrap;
    justify-content: center;
  }
  
  #header {
    font-size: 16px;
    left: 10px;
  }
  #header img {
    height: 24px;
  }
  #accountIcon {
    right: 10px;
  }
}

</style>
</head>

<body>

<div id="header" style="display:flex; align-items:center; gap:10px;">
<img src="/icons/logo.png" height="30" alt="VClust Logo">
VClust Meeting
</div>

<div id="accountIcon" onclick="toggleAccount()">
<img src="/icons/logo.png" width="30">
</div>

<div id="accountPanel">
<h3>My Account</h3>
<p id="userName"></p>
<input id="nameInput" placeholder="Enter your name">
<button onclick="saveName()">Save</button>
<button onclick="logout()">Logout</button>
</div>

<div id="videoStage">
<div id="videoContainer">
<div id="backgroundLayer"></div>
<video id="localVideo" autoplay muted playsinline></video>
</div>
</div>

<div id="controls">

<div class="split-btn">
<button id="videoBtn" class="split-btn-main" data-tooltip="Toggle Camera" onclick="toggleVideo()">
  <span id="camIcon" style="display:flex; align-items:center; justify-content:center; color:white;">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
  </span>
</button>
<button id="camOptionsBtn" class="split-btn-drop" data-tooltip="Camera Options" onclick="toggleCameraOptions(event)">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
</button>
<div id="camOptions" class="cam-options" style="bottom: calc(100% + 15px); left: 50%; transform: translateX(-50%);">
  <div style="padding: 4px 8px; font-size: 12px; color: #aaa;">Background</div>
  <button onclick="changeBackground('none')">None</button>
  <button onclick="changeBackground('blur')">Blur</button>
</div>
</div>

<button id="micBtn" class="controlBtn" data-tooltip="Toggle Microphone">
  <span id="micIcon" style="display:flex; align-items:center; justify-content:center; color:white;">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
  </span>
</button>

<button id="screenBtn" class="controlBtn" data-tooltip="Share Screen">
  <span id="screenIcon" style="display:flex; align-items:center; justify-content:center; color:white;">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
  </span>
</button>

<button id="chatToggleBtnMobile" class="controlBtn" style="display: none;" onclick="toggleMobileChat()" data-tooltip="Open Chat">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
</svg>
</button>

<button id="endMeetingBtn" data-tooltip="Leave Call">
End Meeting
</button>

</div>



<div id="chatPanel">

<div id="chatOpenerWrapper" style="border-bottom:1px solid #444;">
  <div id="chatHeader" style="border-bottom:none;">Meeting Chat</div>
  <button id="closeChatBtnMobile" style="display: none;" onclick="toggleMobileChat()">&#10005;</button>
</div>

<div id="participantsSection">
<div id="participantsTitle">Participants <span id="participantsCount">(0)</span></div>
<ul id="participantsList"></ul>
</div>

<div id="chatBox"></div>

<div id="chatInputArea">
<input id="chatInput" type="text" placeholder="Type message...">
<button id="sendBtn">Send</button>
</div>

<button id="upgradeBtn">Upgrade for Longer Meetings</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/script.js"></script>

<script>

const loggedUser = JSON.parse(localStorage.getItem("user"));

if(loggedUser){
document.getElementById("userName").innerText = loggedUser.name || loggedUser.email;
}

function logout(){
localStorage.removeItem("user");
window.location.href="/login.html";
}

function toggleMobileChat() {
  const panel = document.getElementById("chatPanel");
  panel.classList.toggle("active");
}

</script>

</body>
</html>
